# Railway Nixpacks Configuration
# NOTE: This project should use Dockerfile, not Nixpacks!
# Configure Railway Dashboard: Settings > Build & Deploy > Builder = Dockerfile
#
# If Railway still uses Nixpacks, this config fixes the JAVA_HOME issue:

[phases.setup]
nixPkgs = ["jdk21", "maven"]

[phases.install]
cmds = ["chmod +x ./mvnw || true"]

[phases.build]
# Use a single command to prevent mise from resetting JAVA_HOME between commands
# Unsetting JAVA_HOME forces mvnw to use the Java already on PATH (provided by mise)
cmds = ["unset JAVA_HOME && chmod +x ./mvnw && ./mvnw clean package -DskipTests -B"]

# WARNING: This won't work for Tomcat - you need Dockerfile!
# This is only a temporary workaround if Railway insists on using Nixpacks
[phases.start]
cmd = "echo 'ERROR: This project requires Dockerfile for Tomcat deployment. Please configure Railway to use Dockerfile.'"
